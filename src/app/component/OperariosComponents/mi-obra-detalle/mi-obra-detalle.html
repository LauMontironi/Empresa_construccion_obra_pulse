<section class="obra-detalle">
    <div class="obra-detalle__container">

        <div class="obra-detalle__topbar">
            <button routerLink="/operarios/mis-obras" class="obra-detalle__back-btn">
                ← Volver a mis obras
            </button>
        </div>

        @if (loading) {
        <p>Cargando obra...</p>
        }

        @if (!loading && error) {
        <p>{{ error }}</p>
        }

        @if (!loading && obra) {
        <div class="obra-detalle__card">
            <div class="obra-detalle__media">
                <img [src]="obra.foto || '/assets/obra_default.jpg'" alt="Imagen de la obra">
            </div>

            <div class="obra-detalle__body">
                <p class="obra-detalle__eyebrow">Detalle de obra</p>
                <h1>{{ obra.titulo }}</h1>

                <div class="obra-detalle__meta">
                    <div class="obra-detalle__meta-item">
                        <span>Categoría</span>
                        <strong>{{ obra.categoria }}</strong>
                    </div>

                    <div class="obra-detalle__meta-item">
                        <span>Ubicación</span>
                        <strong>{{ obra.localizacion }}</strong>
                    </div>

                    <div class="obra-detalle__meta-item">
                        <span>Estado</span>
                        <strong>{{ obra.estado }}</strong>
                    </div>
                </div>

                <div class="obra-detalle__description">
                    <h3>Descripción</h3>
                    <p>{{ obra.descripcion }}</p>
                </div>
            </div>
        </div>
        }
    </div>
</section>
